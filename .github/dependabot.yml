version: 2
updates:
  # npm dependencies (grouped so related updates land in a single PR)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
    ignore:
      # Most devDependencies here are the Expo / React Native toolchain
      # (expo, expo-modules-core, expo-module-scripts, react-native, and jest via
      # jest-expo). Their major versions are tied to the Expo SDK and must be
      # upgraded deliberately, so only take minor/patch updates automatically.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Keep the GitHub Actions used by the CI workflow up to date
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
